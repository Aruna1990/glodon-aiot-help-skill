# 广联达行业 AI 平台帮助技能配置

skill:
  name: glodon-ai-help
  version: 1.6.0
  description: 广联达行业 AI 平台使用问题解答（按需学习）

# 文档来源
documentation:
  source: yuque
  base_url: https://glodon-cv-help.yuque.com/cuv0se/ol9231
  space: cuv0se
  book: ol9231
  sync_interval: 7d  # 每周同步一次

# 知识库配置
knowledge_base:
  directory: knowledge/
  embedding_model: text-embedding-ada-002
  chunk_size: 500
  chunk_overlap: 50
  index_type: faiss

# 文档查询优先级配置
# 当用户问题匹配关键词时，自动优先查询相关文档
doc_query_priority:
  - keywords: ["token", "认证", "api key", "api secret", "接口 url", "api 接口"]
    priority_docs:
      - knowledge/ku9i5oea97ynfzt4.md  # 平台认证 Token 说明文档
      - knowledge/tl0hylbi1hm61mu3.md  # Key Secret 认证获取 Token
    rule: "涉及认证和 API 接口时必须先查认证文档"
  
  - keywords: ["sdk", "前端", "集成", "chat-app-sdk", "bot-client-ui", "npm"]
    priority_docs:
      - knowledge/03-coze-studio/sdk/chat_app_sdk.md
      - knowledge/03-coze-studio/sdk/bot_client_ui.md
    rule: "前端集成问题优先查 SDK 文档"
  
  - keywords: ["工作流", "workflow", "appId", "应用 id"]
    priority_docs:
      - knowledge/etgvtorzglntmv39.md  # API 调用
    rule: "工作流和应用配置查 API 调用文档"

# 自动学习配置（按需学习）
learning:
  enabled: true
  auto_trigger: true          # 检测知识缺失时自动学习
  check_on_startup: true      # 启动时检查知识库
  state_file: knowledge/.learn_state.json
  scripts:
    check_and_learn: scripts/check_and_learn.py   # 统一入口
    public_docs: scripts/learn_public_docs.py     # 语雀文档
    chat_app_sdk: scripts/learn_chat_app_sdk.py   # 新版 SDK
    bot_client_ui: scripts/learn_bot_client_ui.py # 旧版 SDK

# 机器人配置
bot:
  name: AI 平台小助手
  avatar: /avatars/ai-platform-bot.png
  welcome_message: |
    你好！我是广联达行业 AI 平台的客服助手 👋
    
    我可以帮你：
    • 解答平台使用问题
    • 提供 API 调用指导
    • 帮助故障排查
    • 查找相关文档
    
    有什么可以帮你的吗？

# 意图识别
intents:
  enabled: true
  model: intent-classifier-v1
  confidence_threshold: 0.7

# 转人工配置
handoff:
  enabled: true
  trigger_keywords:
    - 转人工
    - 人工客服
    - 技术支持
    - 投诉建议
  target: ai_platform_support_queue

# 监控
monitoring:
  log_conversations: true
  track_metrics: true
  alert_on_error: true
  metrics:
    - response_time
    - resolution_rate
    - user_satisfaction
